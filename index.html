<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Sinaiticus — English Translation</title>
<style>
:root {
  --bg: #faf8f5;
  --bg-card: #fff;
  --text: #2c2c2c;
  --text-dim: #6b6b6b;
  --accent: #8b3a3a;
  --accent-hover: #6e2e2e;
  --border: #ddd;
  --sidebar-bg: #f2efe9;
  --sidebar-width: 260px;
  --fn-bg: #fdf6ec;
  --fn-border: #e8d5b5;
  --badge-bg: #eef0f7;
  --badge-border: #c5cbe0;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --bg-card: #252525;
    --text: #e0e0e0;
    --text-dim: #9a9a9a;
    --accent: #c97a7a;
    --accent-hover: #d99494;
    --border: #3a3a3a;
    --sidebar-bg: #1e1e1e;
    --fn-bg: #2d2818;
    --fn-border: #5a4d2a;
    --badge-bg: #1e2233;
    --badge-border: #3a3f60;
  }
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --bg-card: #252525;
  --text: #e0e0e0;
  --text-dim: #9a9a9a;
  --accent: #c97a7a;
  --accent-hover: #d99494;
  --border: #3a3a3a;
  --sidebar-bg: #1e1e1e;
  --fn-bg: #2d2818;
  --fn-border: #5a4d2a;
  --badge-bg: #1e2233;
  --badge-border: #3a3f60;
}
* { box-sizing: border-box; }
body {
  margin: 0; font: 17px/1.7 Georgia, 'Times New Roman', serif;
  background: var(--bg); color: var(--text);
  display: flex; min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width); background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  position: sticky; top: 0; height: 100vh;
}
.sidebar h1 {
  font-size: 18px; padding: 20px 16px 12px; margin: 0;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.3px;
}
.sidebar h1 small { display: block; font-size: 11px; color: var(--text-dim); font-weight: normal; }
.sidebar-toggle {
  display: none; position: fixed; top: 12px; right: 12px;
  z-index: 100; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 20px;
}
.book-search {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.book-search input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 5px; font-size: 13px; background: var(--bg-card); color: var(--text);
}
.book-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.book-group { margin-bottom: 4px; }
.book-group-label {
  padding: 6px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-dim); cursor: default;
}
.book-item {
  padding: 5px 16px 5px 24px; cursor: pointer; font-size: 14px;
  border-left: 3px solid transparent; transition: 0.1s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.book-item:hover { background: rgba(0,0,0,0.04); }
.book-item.active { border-left-color: var(--accent); background: rgba(139,58,58,0.08); color: var(--accent); font-weight: 600; }
.book-item.hidden { display: none; }

/* ── Main ── */
.main {
  flex: 1; padding: 30px 40px; max-width: 820px; overflow-y: auto;
}
.main-header {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.main-header h2 { margin: 0; font-size: 24px; font-weight: normal; }
.chapter-nav {
  display: flex; align-items: center; gap: 6px; margin-left: auto;
}
.chapter-nav select {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 14px; background: var(--bg-card); color: var(--text); cursor: pointer;
}
.chapter-nav button {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 14px; background: var(--bg-card); color: var(--text); cursor: pointer;
}
.chapter-nav button:hover { background: var(--sidebar-bg); }

/* ── Verses ── */
.verses { counter-reset: verse; }
.verse {
  margin-bottom: 10px; padding: 4px 0; position: relative;
}
.vnum {
  font-size: 11px; font-weight: 700; color: var(--accent);
  vertical-align: super; cursor: pointer; user-select: none;
  margin-right: 3px;
}
.vnum:hover { text-decoration: underline; }
.vnum.show-orig { color: var(--text-dim); }
.translation { vertical-align: baseline; }
.original {
  display: none; font-family: 'Noto Serif', 'Gentium Plus', 'Palatino Linotype', 'Segoe UI Historic', serif;
  font-size: 15px; color: var(--text-dim); margin-top: 2px; padding-left: 22px;
}
.show-orig + .translation + .original { display: block; }

.fn-marker {
  display: inline-block; font-size: 11px; color: var(--accent);
  cursor: pointer; margin-left: 2px; vertical-align: super; line-height: 1;
}
.fn-marker:hover { text-decoration: underline; }
.var-badge {
  display: inline-block; font-size: 9px; font-family: sans-serif;
  background: var(--badge-bg); border: 1px solid var(--badge-border);
  border-radius: 3px; padding: 0 4px; margin-left: 3px; cursor: pointer; vertical-align: super;
  line-height: 1.4; color: var(--text-dim);
}
.var-badge:hover { background: var(--badge-border); }

.fn-popup {
  display: none; position: absolute; z-index: 10;
  background: var(--fn-bg); border: 1px solid var(--fn-border);
  border-radius: 6px; padding: 10px 14px; font-size: 13px;
  max-width: 400px; line-height: 1.5; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}
.fn-popup.show { display: block; }
.fn-popup .fn-type {
  display: inline-block; font-size: 9px; font-family: sans-serif;
  text-transform: uppercase; letter-spacing: 0.5px;
  background: var(--accent); color: #fff; border-radius: 3px;
  padding: 1px 6px; margin-bottom: 4px;
}

/* ── Loading / Empty ── */
.loading, .empty-state {
  padding: 60px 20px; text-align: center; color: var(--text-dim);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; position: fixed; z-index: 50; width: 280px; }
  .sidebar.open { display: flex; }
  .sidebar-toggle { display: block; }
  .main { padding: 20px; }
  .main-header { flex-direction: column; align-items: flex-start; }
  .chapter-nav { margin-left: 0; width: 100%; }
  .fn-popup { max-width: calc(100vw - 40px); }
}

/* ── Dark mode toggle ── */
.dark-toggle {
  position: fixed; bottom: 16px; right: 16px; z-index: 40;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 30px; padding: 6px 14px; cursor: pointer;
  font-size: 13px; font-family: sans-serif; color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<button class="sidebar-toggle" id="menuBtn" aria-label="Toggle menu">☰</button>

<nav class="sidebar" id="sidebar">
  <h1>Codex Sinaiticus <small>2026 American English Translation</small></h1>
  <div class="book-search"><input type="text" id="bookSearch" placeholder="Search books…" autocomplete="off"></div>
  <div class="book-list" id="bookList"></div>
</nav>

<main class="main" id="main">
  <div class="empty-state" id="welcome">
    <p style="font-size:18px;margin-bottom:8px;">Codex Sinaiticus</p>
    <p style="font-size:14px;color:var(--text-dim);">Select a book from the sidebar to begin reading.</p>
  </div>
  <div id="reader" style="display:none;">
    <div class="main-header">
      <h2 id="bookTitle"></h2>
      <div class="chapter-nav">
        <button id="prevCh" title="Previous chapter">←</button>
        <select id="chSelect"></select>
        <button id="nextCh" title="Next chapter">→</button>
      </div>
    </div>
    <div class="has-notes" id="hasNotes" style="display:none;"></div>
    <div id="verses"></div>
  </div>
</main>

<button class="dark-toggle" id="darkToggle">☾ Dark</button>

<script>
;(function() {
'use strict';

// ── State ──
let index = null;
let books = [];
let currentSlug = null;
let currentData = null;
let currentCh = null;

// ── Cache ──
const cache = {};

// ── DOM refs ──
const $ = id => document.getElementById(id);
const sidebar = $('sidebar');
const menuBtn = $('menuBtn');
const bookList = $('bookList');
const bookSearch = $('bookSearch');
const reader = $('reader');
const welcome = $('welcome');
const bookTitle = $('bookTitle');
const chSelect = $('chSelect');
const prevCh = $('prevCh');
const nextCh = $('nextCh');
const versesEl = $('verses');
const hasNotes = $('hasNotes');
const darkToggle = $('darkToggle');

// ── Books by category ──
const CATEGORIES = {
  'Old Testament': [
    'genesis','leviticus','numbers','deuteronomy','joshua','judges',
    '1-chronicles','2-esdras','esther','tobit','judith',
    '1-maccabees','4-maccabees',
    'isaiah','jeremiah','lamentations','joel','obadiah','jonah','nahum',
    'habakkuk','zephaniah','haggai','zechariah','malachi',
    'psalms','proverbs','ecclesiastes','song-of-solomon',
    'wisdom-of-solomon','sirach','job'
  ],
  'New Testament': [
    'matthew','mark','luke','john','romans',
    '1-corinthians','2-corinthians','galatians','ephesians',
    'philippians','colossians','1-thessalonians','2-thessalonians',
    'hebrews','1-timothy','2-timothy','titus','philemon','acts',
    'james','1-peter','2-peter','1-john','2-john','3-john','jude','revelation'
  ],
  'Additional': [
    'epistle-of-barnabas','shepherd-of-hermas'
  ]
};

// ── Init ──
async function init() {
  await loadIndex();
  renderBookList();
  setupEventListeners();
  applyTheme();
  // Check URL hash
  const hash = location.hash.slice(1);
  if (hash) {
    const parts = hash.split('/');
    if (parts.length >= 2) openBook(parts[0], parseInt(parts[1]));
    else if (parts.length === 1) openBook(parts[0], 1);
  }
}

async function loadIndex() {
  if (index) return;
  const r = await fetch('data/index.json');
  index = await r.json();
  books = index.books;
}

function getBook(slug) {
  return books.find(b => b.slug === slug);
}

// ── Render sidebar ──
function renderBookList(filter) {
  filter = (filter || '').toLowerCase().trim();
  let html = '';
  for (const [cat, slugs] of Object.entries(CATEGORIES)) {
    const filtered = slugs.filter(s => {
      const b = getBook(s);
      if (!b) return false;
      return !filter || b.name.toLowerCase().includes(filter) || s.includes(filter);
    });
    if (filter && filtered.length === 0) continue;
    html += `<div class="book-group"><div class="book-group-label">${cat}</div>`;
    for (const slug of filtered) {
      const b = getBook(slug);
      if (!b) continue;
      const active = slug === currentSlug ? ' active' : '';
      html += `<div class="book-item${active}" data-slug="${slug}">${b.name}</div>`;
    }
    html += '</div>';
  }
  bookList.innerHTML = html;
}

// ── Open book/chapter ──
async function openBook(slug, chapter) {
  welcome.style.display = 'none';
  reader.style.display = 'block';

  // Update sidebar active
  document.querySelectorAll('.book-item').forEach(el => el.classList.toggle('active', el.dataset.slug === slug));

  if (currentSlug !== slug) {
    currentSlug = slug;
    currentData = null;
    currentCh = null;
  }

  if (!cache[slug]) {
    versesEl.innerHTML = '<div class="loading">Loading…</div>';
  }

  try {
    if (!cache[slug]) {
      const r = await fetch(`data/translations/${slug}.json`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      cache[slug] = await r.json();
    }
    currentData = cache[slug];
  } catch (e) {
    versesEl.innerHTML = `<div class="empty-state">Error loading: ${e.message}</div>`;
    return;
  }

  // Find a valid chapter
  const chapters = currentData.chapters;
  if (chapters.length === 0) {
    versesEl.innerHTML = '<div class="empty-state">No chapters found.</div>';
    return;
  }

  // Find chapter index — allow any chapter number the JSON has
  let chIdx = chapters.findIndex(c => c.chapter === chapter);
  if (chIdx === -1) chIdx = 0;
  const ch = chapters[chIdx];
  if (!ch) return;

  currentCh = ch.chapter;

  // Update header
  const info = getBook(slug);
  bookTitle.textContent = info ? info.name : slug;

  // Chapter select
  chSelect.innerHTML = chapters.map((c, i) =>
    `<option value="${c.chapter}" ${c.chapter === currentCh ? 'selected' : ''}>Chapter ${c.chapter}</option>`
  ).join('');

  // Update hash
  history.replaceState(null, '', `#${slug}/${currentCh}`);

  // Render verses
  renderChapter(ch, slug);
  updateNotes(ch, slug);
  updateNav(chapters.length, chIdx);
}

function renderChapter(ch, slug) {
  const v = ch.verses || [];
  if (v.length === 0) {
    versesEl.innerHTML = '<div class="empty-state">No verses in this chapter.</div>';
    return;
  }
  let html = '<div class="verses">';
  for (const verse of v) {
    const t = verse.translation || '';
    const o = verse.original || '';
    const fns = verse.footnotes || [];
    const hasFn = fns.length > 0;
    const hasVar = fns.some(f => f.type === 'variant');
    const hasMissing = fns.some(f => f.type === 'missing-text');

    if (!t && !o) continue; // skip empty structural entries

    html += `<div class="verse" data-verse="${verse.verse}">`;
    html += `<span class="vnum" data-verse="${verse.verse}">${verse.verse}</span>`;
    html += `<span class="translation">${escapeHtml(t)}</span>`;
    if (o) {
      html += `<span class="original">${escapeHtml(o)}</span>`;
    }
    if (hasVar) {
      html += `<span class="var-badge" data-fns='${JSON.stringify(fns.filter(f => f.type === 'variant'))}'>var</span>`;
    }
    if (hasFn) {
      for (const fn of fns) {
        const id = fn.id || `${slug}-${ch.chapter}-${verse.verse}-${fn.type}`;
        html += `<sup class="fn-marker" data-fn-id="${escapeHtml(id)}" data-fn-text="${escapeHtml(fn.text)}" data-fn-type="${escapeHtml(fn.type)}">†</sup>`;
      }
    }
    if (hasMissing && t) {
      html += ` <span style="font-size:12px;color:var(--text-dim);font-style:italic;">[text damaged]</span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  versesEl.innerHTML = html;
}

function updateNotes(ch, slug) {
  // Collect all notes from the chapter
  const allNotes = [];
  for (const v of ch.verses) {
    for (const fn of (v.footnotes || [])) {
      allNotes.push(fn);
    }
  }
  if (allNotes.length > 0) {
    hasNotes.style.display = 'block';
  } else {
    hasNotes.style.display = 'none';
  }
}

function updateNav(totalCh, chIdx) {
  prevCh.disabled = chIdx <= 0;
  nextCh.disabled = chIdx >= totalCh - 1;
}

// ── Event handlers ──
function setupEventListeners() {
  // Book list click
  bookList.addEventListener('click', e => {
    const item = e.target.closest('.book-item');
    if (item) {
      const slug = item.dataset.slug;
      const b = getBook(slug);
      const ch = b ? 1 : 1;
      openBook(slug, ch);
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    }
  });

  // Chapter select
  chSelect.addEventListener('change', () => {
    const ch = parseInt(chSelect.value);
    if (currentSlug) openBook(currentSlug, ch);
  });

  // Previous / Next chapter
  prevCh.addEventListener('click', () => {
    if (!currentData) return;
    const idx = currentData.chapters.findIndex(c => c.chapter === currentCh);
    if (idx > 0) openBook(currentSlug, currentData.chapters[idx - 1].chapter);
  });
  nextCh.addEventListener('click', () => {
    if (!currentData) return;
    const idx = currentData.chapters.findIndex(c => c.chapter === currentCh);
    if (idx < currentData.chapters.length - 1) openBook(currentSlug, currentData.chapters[idx + 1].chapter);
  });

  // Search
  bookSearch.addEventListener('input', () => renderBookList(bookSearch.value));

  // Menu toggle (mobile)
  menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

  // Click outside sidebar to close on mobile
  document.addEventListener('click', e => {
    if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== menuBtn) {
      sidebar.classList.remove('open');
    }
  });

  // Verse number click → toggle Greek
  versesEl.addEventListener('click', e => {
    const vnum = e.target.closest('.vnum');
    if (vnum) {
      vnum.classList.toggle('show-orig');
    }
  });

  // Footnote marker click → show popup
  versesEl.addEventListener('click', e => {
    const fn = e.target.closest('.fn-marker');
    if (fn) {
      e.stopPropagation();
      // Close all other popups
      document.querySelectorAll('.fn-popup').forEach(p => p.remove());
      const popup = document.createElement('div');
      popup.className = 'fn-popup show';
      const type = fn.dataset.fnType || 'note';
      popup.innerHTML = `<div class="fn-type">${escapeHtml(type)}</div>${escapeHtml(fn.dataset.fnText || '')}`;
      document.body.appendChild(popup);
      const rect = fn.getBoundingClientRect();
      let top = rect.bottom + 6;
      let left = rect.left;
      if (left + 400 > window.innerWidth) left = window.innerWidth - 410;
      if (top + 200 > window.innerHeight) top = rect.top - 10 - popup.offsetHeight;
      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }
  });

  // Variant badge click → show popup
  versesEl.addEventListener('click', e => {
    const badge = e.target.closest('.var-badge');
    if (badge) {
      e.stopPropagation();
      document.querySelectorAll('.fn-popup').forEach(p => p.remove());
      let fns;
      try { fns = JSON.parse(badge.dataset.fns); } catch { fns = []; }
      const popup = document.createElement('div');
      popup.className = 'fn-popup show';
      popup.innerHTML = fns.map(f =>
        `<div style="margin-bottom:4px;"><div class="fn-type">${escapeHtml(f.type)}</div>${escapeHtml(f.text)}</div>`
      ).join('') || '<div class="fn-type">variant</div><em>No details</em>';
      document.body.appendChild(popup);
      const rect = badge.getBoundingClientRect();
      let top = rect.bottom + 6;
      let left = rect.left;
      if (left + 400 > window.innerWidth) left = window.innerWidth - 410;
      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }
  });

  // Close popups on click elsewhere
  document.addEventListener('click', e => {
    if (!e.target.closest('.fn-popup') && !e.target.closest('.fn-marker') && !e.target.closest('.var-badge')) {
      document.querySelectorAll('.fn-popup').forEach(p => p.remove());
    }
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') prevCh.click();
    else if (e.key === 'ArrowRight') nextCh.click();
  });

  // Dark toggle
  darkToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      darkToggle.textContent = '☾ Dark';
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      darkToggle.textContent = '☀ Light';
      localStorage.setItem('theme', 'dark');
    }
  });
}

// ── Theme ──
function applyTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    darkToggle.textContent = '☀ Light';
  }
}

// ── Utils ──
function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Start ──
init();

})();
</script>
</body>
</html>
